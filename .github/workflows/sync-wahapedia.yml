name: Sync Wahapedia WH40k

on:
  push:
    branches:
      - main
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch latest WH40k export data
        run: python scripts/fetch_wh40k.py

      - name: Refresh unit image index
        run: python scripts/sync_unit_images.py --web-root docs --datasheets docs/data/Datasheets.csv --factions docs/data/Factions.csv --out docs/data/unit_images.json --assets-dir docs/assets/unit-previews --max-lookups 60 --timeout 8

      - name: Commit and push when changed
        run: |
          git add docs/data docs/assets

          if git diff --cached --quiet; then
            echo "No changes to commit"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git commit -m "chore(data): sync wahapedia wh40k export"
          git push
