<!doctype html>
<html lang="ru">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Wahapedia WH40k Mirror</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <h1>Wahapedia WH40k Mirror</h1>
      <p>Просмотр данных WH40k: фракции, юниты, способности.</p>
    </header>

    <main class="container">
      <section class="controls">
        <label>
          Фракция
          <select id="faction-select"></select>
        </label>

        <label>
          Поиск юнита
          <input id="unit-search" type="search" placeholder="Например: Intercessor" />
        </label>

        <button id="reload-button" type="button">Обновить данные</button>
      </section>

      <section class="meta" id="meta"></section>

      <section class="layout">
        <aside class="panel">
          <h2>Юниты</h2>
          <div id="unit-list" class="unit-list"></div>
        </aside>

        <article class="panel detail">
          <h2 id="unit-title">Выберите юнит</h2>
          <p id="unit-subtitle" class="subtitle"></p>

          <h3>Профиль</h3>
          <table class="kv-table" id="profile-table">
            <tbody></tbody>
          </table>

          <h3>Keywords</h3>
          <div id="keywords" class="chips"></div>

          <h3>Abilities</h3>
          <table class="data-table" id="abilities-table">
            <thead></thead>
            <tbody></tbody>
          </table>
        </article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="./app.js" type="module"></script>
  </body>
</html>
