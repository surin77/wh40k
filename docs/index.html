<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>WH40k Datasheet Viewer</title>
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <header class="topbar">
      <div class="topbar-inner">
        <div>
          <h1>WH40k Datasheet Viewer</h1>
          <p>powered by <a href="https://wahapedia.ru/" target="_blank" rel="noopener noreferrer">Wahapedia</a></p>
        </div>
        <div class="topbar-controls">
          <nav class="top-nav">
            <a class="top-nav-link active" href="./index.html">Datasheets</a>
            <a class="top-nav-link" href="./rules.html">Core Rules</a>
          </nav>
          <label class="theme-toggle" aria-label="Theme toggle">
            <span>Theme</span>
            <input id="theme-toggle" class="toggle-switch" type="checkbox" />
          </label>
        </div>
      </div>
    </header>

    <main class="page">
      <section class="toolbar">
        <label>
          Faction
          <select id="faction-select"></select>
        </label>

        <label>
          Detachment
          <select id="detachment-select"></select>
        </label>

        <label>
          Unit Search
          <input id="unit-search" type="search" placeholder="Example: Culexus Assassin" />
        </label>

        <label class="toolbar-checkbox">
          <span>Legends</span>
          <span class="toolbar-checkbox-control">
            <input id="show-legends-toggle" class="toggle-switch" type="checkbox" aria-label="Show Legends" />
          </span>
        </label>
      </section>

      <section class="workspace">
        <aside class="sidebar panel">
          <h2>Datasheets</h2>
          <div id="keyword-filter-indicator" class="keyword-filter-indicator"></div>
          <div id="unit-list" class="unit-list"></div>
        </aside>

        <article class="panel datasheet">
          <header class="sheet-header">
            <div class="sheet-header-main">
              <div class="unit-title-row">
                <h2 id="unit-title">Select a unit</h2>
                <button id="unit-photo-btn" class="unit-photo-btn" type="button" aria-label="Preview unit image" hidden>
                  <svg viewBox="0 0 24 24" aria-hidden="true" focusable="false">
                    <path
                      d="M9 4.5 7.9 6H5.5A2.5 2.5 0 0 0 3 8.5v8A2.5 2.5 0 0 0 5.5 19h13a2.5 2.5 0 0 0 2.5-2.5v-8A2.5 2.5 0 0 0 18.5 6h-2.4L15 4.5H9Zm3 3a5 5 0 1 1 0 10 5 5 0 0 1 0-10Zm0 1.8A3.2 3.2 0 1 0 12 15.7 3.2 3.2 0 0 0 12 9.3Z"
                    />
                  </svg>
                </button>
              </div>
              <p id="unit-meta" class="muted"></p>
            </div>
            <div id="role-badge" class="role-badge"></div>
          </header>

          <section id="statline" class="statline"></section>

          <section class="sheet-grid">
            <div>
              <section class="block" id="ranged-block">
                <h3>Ranged Weapons</h3>
                <table id="ranged-table" class="data-table weapon-table">
                  <colgroup>
                    <col class="col-weapon" />
                    <col class="col-range" />
                    <col class="col-a" />
                    <col class="col-bsws" />
                    <col class="col-s" />
                    <col class="col-ap" />
                    <col class="col-d" />
                  </colgroup>
                  <thead></thead>
                  <tbody></tbody>
                </table>
              </section>

              <section class="block" id="melee-block">
                <h3>Melee Weapons</h3>
                <table id="melee-table" class="data-table weapon-table">
                  <colgroup>
                    <col class="col-weapon" />
                    <col class="col-range" />
                    <col class="col-a" />
                    <col class="col-bsws" />
                    <col class="col-s" />
                    <col class="col-ap" />
                    <col class="col-d" />
                  </colgroup>
                  <thead></thead>
                  <tbody></tbody>
                </table>
              </section>

              <section class="block">
                <h3>Detachment</h3>
                <div id="detachment-content" class="text-block"></div>
              </section>
            </div>

            <div>
              <section class="block">
                <h3>Abilities</h3>
                <div id="abilities-list" class="abilities-list"></div>
              </section>

              <section class="block">
                <h3>Keywords</h3>
                <div id="keywords" class="chips"></div>
              </section>

              <section class="block">
                <h3>Unit Cost</h3>
                <div id="unit-cost" class="cost-list"></div>
              </section>

              <section class="block">
                <h3>Unit Composition / Loadout</h3>
                <div id="composition" class="text-block"></div>
              </section>
            </div>
          </section>
        </article>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/papaparse@5.4.1/papaparse.min.js"></script>
    <script src="./app.js" type="module"></script>
    <button id="scroll-top-btn" class="scroll-top-btn" type="button" aria-label="Back to top">↑</button>
  </body>
</html>
